name: publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  nuget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet test CSweetAgentSdk.slnx --configuration Release
      - run: dotnet pack src/CSweet.Agent.SDK/CSweet.Agent.SDK.csproj --configuration Release --no-build --output artifacts
      - run: dotnet nuget push "artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
